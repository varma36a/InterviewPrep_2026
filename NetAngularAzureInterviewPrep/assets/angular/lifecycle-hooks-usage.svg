<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" role="img" aria-label="When to use each Angular lifecycle hook">
  <rect width="920" height="480" rx="16" fill="#09090b" stroke="#3f3f46" stroke-width="2"/>
  <text x="460" y="38" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="20" font-weight="700">When To Use Each Hook (Interview Cheat Sheet)</text>

  <g font-family="system-ui,sans-serif">
    <!-- Header row -->
    <rect x="40" y="58" width="840" height="36" rx="8" fill="#27272a"/>
    <text x="60" y="81" fill="#22d3ee" font-size="13" font-weight="700">Hook</text>
    <text x="240" y="81" fill="#22d3ee" font-size="13" font-weight="700">Use when</text>
    <text x="620" y="81" fill="#22d3ee" font-size="13" font-weight="700">Example</text>

    <!-- Rows -->
    <rect x="40" y="104" width="840" height="52" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="60" y="135" fill="#34d399" font-size="14" font-weight="600">ngOnInit</text>
    <text x="240" y="128" fill="#fafafa" font-size="13">One-time setup after inputs bound</text>
    <text x="240" y="146" fill="#71717a" font-size="11">Fetch API data, start streams</text>
    <text x="620" y="135" fill="#a1a1aa" font-size="12">loadOrders(), subscribe()</text>

    <rect x="40" y="164" width="840" height="52" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="60" y="195" fill="#34d399" font-size="14" font-weight="600">ngOnChanges</text>
    <text x="240" y="188" fill="#fafafa" font-size="13">@Input reference/value changes</text>
    <text x="240" y="206" fill="#71717a" font-size="11">React to parent updates</text>
    <text x="620" y="195" fill="#a1a1aa" font-size="12">reload when orderId changes</text>

    <rect x="40" y="224" width="840" height="52" rx="8" fill="#18181b" stroke="#22d3ee" stroke-width="2"/>
    <text x="60" y="255" fill="#22d3ee" font-size="14" font-weight="700">ngAfterViewInit</text>
    <text x="240" y="248" fill="#fafafa" font-size="13">ViewChild &amp; DOM are ready</text>
    <text x="240" y="266" fill="#71717a" font-size="11">Third-party libs need DOM element</text>
    <text x="620" y="255" fill="#a1a1aa" font-size="12">chart.init(), input.focus()</text>

    <rect x="40" y="284" width="840" height="52" rx="8" fill="#18181b" stroke="#fbbf24" stroke-width="2"/>
    <text x="60" y="315" fill="#fbbf24" font-size="14" font-weight="700">ngOnDestroy</text>
    <text x="240" y="308" fill="#fafafa" font-size="13">Component is being destroyed</text>
    <text x="240" y="326" fill="#71717a" font-size="11">Prevent memory leaks</text>
    <text x="620" y="315" fill="#a1a1aa" font-size="12">takeUntil, clearInterval</text>

    <rect x="40" y="344" width="840" height="52" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="60" y="375" fill="#a78bfa" font-size="14" font-weight="600">ngAfterContentInit</text>
    <text x="240" y="368" fill="#fafafa" font-size="13">Projected ng-content ready</text>
    <text x="240" y="386" fill="#71717a" font-size="11">Access ContentChild slots</text>
    <text x="620" y="375" fill="#a1a1aa" font-size="12">read projected tabs</text>

    <rect x="40" y="404" width="840" height="52" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="60" y="435" fill="#71717a" font-size="14" font-weight="600">ngDoCheck / *Checked</text>
    <text x="240" y="428" fill="#fafafa" font-size="13">Advanced / rare  custom CD</text>
    <text x="240" y="446" fill="#71717a" font-size="11">Avoid heavy logic here</text>
    <text x="620" y="435" fill="#a1a1aa" font-size="12">mention only if asked</text>
  </g>
</svg>
