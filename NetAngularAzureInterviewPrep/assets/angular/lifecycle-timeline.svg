<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" role="img" aria-label="Angular component lifecycle timeline">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="920" height="720" rx="16" fill="url(#bg)" stroke="#3f3f46" stroke-width="2"/>
  <text x="460" y="42" text-anchor="middle" fill="#fafafa" font-family="Arial,sans-serif" font-size="22" font-weight="700">Angular Component Lifecycle - Execution Order</text>
  <text x="460" y="68" text-anchor="middle" fill="#a1a1aa" font-family="Arial,sans-serif" font-size="13">Hooks run top to bottom during creation, update, and destruction</text>

  <rect x="40" y="88" width="840" height="180" rx="12" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.35)"/>
  <text x="60" y="112" fill="#34d399" font-family="Arial,sans-serif" font-size="14" font-weight="700">CREATION</text>
  <rect x="40" y="278" width="840" height="250" rx="12" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.35)"/>
  <text x="60" y="302" fill="#22d3ee" font-family="Arial,sans-serif" font-size="14" font-weight="700">UPDATE (change detection cycles)</text>
  <rect x="40" y="538" width="840" height="150" rx="12" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.35)"/>
  <text x="60" y="562" fill="#fbbf24" font-family="Arial,sans-serif" font-size="14" font-weight="700">DESTRUCTION</text>

  <line x1="120" y1="130" x2="120" y2="640" stroke="#52525b" stroke-width="3" stroke-dasharray="6 4"/>

  <g font-family="Arial,sans-serif">
    <circle cx="120" cy="145" r="8" fill="#34d399"/>
    <rect x="150" y="128" width="700" height="34" rx="8" fill="#27272a" stroke="#34d399"/>
    <text x="165" y="150" fill="#fafafa" font-size="14" font-weight="600">constructor</text>
    <text x="320" y="150" fill="#a1a1aa" font-size="13">DI injection - keep logic minimal</text>

    <circle cx="120" cy="185" r="8" fill="#34d399"/>
    <rect x="150" y="168" width="700" height="34" rx="8" fill="#27272a" stroke="#34d399"/>
    <text x="165" y="190" fill="#fafafa" font-size="14" font-weight="600">ngOnChanges</text>
    <text x="320" y="190" fill="#a1a1aa" font-size="13">@Input values set/changed - SimpleChanges</text>

    <circle cx="120" cy="225" r="8" fill="#34d399"/>
    <rect x="150" y="208" width="700" height="34" rx="8" fill="#27272a" stroke="#34d399"/>
    <text x="165" y="230" fill="#fafafa" font-size="14" font-weight="600">ngOnInit</text>
    <text x="320" y="230" fill="#a1a1aa" font-size="13">One-time init - load data, subscribe</text>

    <circle cx="120" cy="265" r="8" fill="#34d399"/>
    <rect x="150" y="248" width="700" height="34" rx="8" fill="#27272a" stroke="#34d399"/>
    <text x="165" y="270" fill="#fafafa" font-size="14" font-weight="600">ngDoCheck</text>
    <text x="320" y="270" fill="#a1a1aa" font-size="13">Custom change detection - use sparingly</text>
  </g>

  <g font-family="Arial,sans-serif">
    <circle cx="120" cy="330" r="8" fill="#22d3ee"/>
    <rect x="150" y="313" width="700" height="34" rx="8" fill="#27272a" stroke="#22d3ee"/>
    <text x="165" y="335" fill="#fafafa" font-size="14" font-weight="600">ngAfterContentInit / ngAfterContentChecked</text>
    <text x="520" y="335" fill="#a1a1aa" font-size="13">Projected content ready</text>

    <circle cx="120" cy="375" r="8" fill="#22d3ee" filter="url(#glow)"/>
    <rect x="150" y="358" width="700" height="34" rx="8" fill="#27272a" stroke="#22d3ee" stroke-width="2"/>
    <text x="165" y="380" fill="#22d3ee" font-size="14" font-weight="700">ngAfterViewInit (key)</text>
    <text x="360" y="380" fill="#a1a1aa" font-size="13">ViewChild / DOM ready - charts, focus()</text>

    <circle cx="120" cy="420" r="8" fill="#22d3ee"/>
    <rect x="150" y="403" width="700" height="34" rx="8" fill="#27272a" stroke="#22d3ee"/>
    <text x="165" y="425" fill="#fafafa" font-size="14" font-weight="600">ngAfterViewChecked</text>
    <text x="340" y="425" fill="#a1a1aa" font-size="13">After every view check - avoid heavy work</text>

    <circle cx="120" cy="465" r="8" fill="#22d3ee"/>
    <rect x="150" y="448" width="700" height="34" rx="8" fill="#27272a" stroke="#22d3ee"/>
    <text x="165" y="470" fill="#fafafa" font-size="14" font-weight="600">ngOnChanges (again on @Input updates)</text>
    <text x="430" y="470" fill="#a1a1aa" font-size="13">Repeats when parent sends new input</text>
  </g>

  <g font-family="Arial,sans-serif">
    <circle cx="120" cy="590" r="8" fill="#fbbf24" filter="url(#glow)"/>
    <rect x="150" y="573" width="700" height="34" rx="8" fill="#27272a" stroke="#fbbf24" stroke-width="2"/>
    <text x="165" y="595" fill="#fbbf24" font-size="14" font-weight="700">ngOnDestroy (key)</text>
    <text x="340" y="595" fill="#a1a1aa" font-size="13">Unsubscribe, clear timers, release resources</text>
  </g>

  <text x="460" y="698" text-anchor="middle" fill="#71717a" font-family="Arial,sans-serif" font-size="12">Interview focus: ngOnInit | ngOnChanges | ngAfterViewInit | ngOnDestroy</text>
</svg>
